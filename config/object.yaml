# OBJECT PRIORITY CLASSIFICATION

priority_levels:
  highest:
    description: "Primary focus - pet care related"
    classes: ["dog", "cat"]
    handling: "Always track and respond"

  high:
    description: "Important household items and persons"
    classes: ["person", "chair", "bed", "refrigerator", "toilet", "sports ball"]
    handling: "Track when detected"

  medium:
    description: "Common household items"
    classes: ["bicycle", "car", "bus", "bottle", "cup", "tv", "laptop", "cell phone"]
    handling: "Optional tracking"

  low:
    description: "Occasional items"
    classes: ["frisbee", "book", "scissors", "vase"]
    handling: "Background recognition"

# ROBOT CAPABILITY MATRIX

robot_capability:
  description: "Which objects the robot can realistically interact with"

  can_detect:
    all: true
    count: 80

  can_approach:
    description: "Robot can navigate towards this object"
    examples: ["person", "dog", "cat", "chair", "toy"]

  can_observe:
    description: "Robot can rotate to look at this object"
    examples: ["all moving objects", "all stationary objects"]

  can_follow:
    description: "Robot can track moving instances of this object"
    examples: ["person", "dog", "cat", "bicycle", "car"]

# SUMMARY STATISTICS

