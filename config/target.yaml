# Static objects: ball, bed, bowl, potted_plant, chair
# Dynamic objects: person, dog, cat

# !!! x, y should be updated to actual positions after map creation !!!


targets:
  ball_zone:
    frame_id: "map"
    x: 1.15
    y: 0.40
    yaw: 0.0
    description: "Ball location for play"
    
  bowl_zone:
    frame_id: "map"
    x: 1.35
    y: 0.20
    yaw: 0.0
    description: "Food bowl position"

  bed_zone:
    frame_id: "map"
    x: 5.0
    y: 13.0
    yaw: 0.0
    description: "Bed location"

  chair_zone:
    frame_id: "map"
    x: 1.70
    y: 0.58
    yaw: 0.0
    description: "Chair area"

  safe_observe_zone:
    frame_id: "map"
    x: 2.0
    y: 1.0
    yaw: 0.0
    description: "Safe observation point for dangerous object"

  potted_plant_zone:
    # potted_plant is observe-only (approach: false, follow: false)
    # Use the safe observe zone rather than navigating directly to the plant.

    frame_id: "map"
    x: 2.0
    y: 1.0
    yaw: 0.0
    description: "Potted plant observation-only zone"

# Dynamic targets (people, dogs, cats) will be detected and tracked in real-time, 
# so their positions are not predefined in this configuration.
